<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="차량용 안드로이드 런처 - 음악과 내비게이션">
<meta name="theme-color" content="#00aaff">
<link rel="manifest" href="manifest.json">
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>
<title>CarOS Launcher</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #080c14;
    --bg-panel: #0d1422;
    --bg-card: #121a2e;
    --bg-glass: rgba(20, 30, 55, 0.85);
    --accent-blue: #00aaff;
    --accent-cyan: #00e5ff;
    --accent-amber: #ffaa00;
    --accent-green: #00e676;
    --accent-red: #ff3d5a;
    --text-primary: #e8f0ff;
    --text-secondary: #7a8fbb;
    --text-dim: #3a4a6a;
    --border: rgba(0, 170, 255, 0.15);
    --border-bright: rgba(0, 170, 255, 0.4);
    --glow-blue: 0 0 20px rgba(0,170,255,0.3);
    --glow-cyan: 0 0 20px rgba(0,229,255,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deep);
    font-family: 'Noto Sans KR', sans-serif;
    height: 100vh;
    overflow: hidden;
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
  }

  /* ── TOP STATUS BAR ── */
  .statusbar {
    height: 44px;
    background: rgba(8,12,20,0.95);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    flex-shrink: 0;
    backdrop-filter: blur(10px);
  }
  .statusbar-left { display: flex; align-items: center; gap: 16px; }
  .statusbar-center { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; color: var(--accent-blue); letter-spacing: 3px; }
  .statusbar-right { display: flex; align-items: center; gap: 14px; }

  .status-time { font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 600; color: var(--text-primary); }
  .status-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-secondary); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
  .status-temp { color: var(--accent-amber); font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 600; }

  /* ── MAIN LAYOUT ── */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
    gap: 0;
  }

  /* ── LEFT PANEL (Music) 30% ── */
  .panel-music {
    width: 30%;
    background: linear-gradient(160deg, #0d1422 0%, #080e1c 100%);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .panel-music::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-blue), var(--accent-cyan), transparent);
    animation: scanline 3s ease-in-out infinite;
  }

  @keyframes scanline {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* Music Panel Header */
  .music-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .panel-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text-secondary);
    text-transform: uppercase;
  }

  .yt-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,0,0,0.15);
    border: 1px solid rgba(255,0,0,0.3);
    border-radius: 20px;
    padding: 3px 10px;
  }
  .yt-badge svg { width: 14px; height: 14px; }
  .yt-badge span { font-size: 10px; font-weight: 700; color: #ff4444; letter-spacing: 1px; }

  /* App Selector Tabs */
  .music-tabs {
    display: flex;
    gap: 6px;
    padding: 10px 12px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }

  .music-tab {
    flex: 1;
    padding: 8px 6px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: all 0.2s;
    color: var(--text-secondary);
  }
  .music-tab:hover { border-color: var(--border-bright); color: var(--text-primary); }
  .music-tab.active {
    background: rgba(0,170,255,0.12);
    border-color: var(--accent-blue);
    color: var(--accent-blue);
    box-shadow: var(--glow-blue);
  }
  .music-tab svg { width: 20px; height: 20px; }
  .music-tab span { font-size: 9px; font-weight: 600; letter-spacing: 0.5px; }

  /* Now Playing Card */
  .now-playing {
    margin: 12px;
    background: var(--bg-card);
    border-radius: 14px;
    border: 1px solid var(--border);
    padding: 14px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .now-playing::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,170,255,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .np-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent-blue);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .np-cover-row { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }

  .np-cover {
    width: 56px; height: 56px;
    border-radius: 10px;
    background: linear-gradient(135deg, #1a0533, #0d1a44);
    position: relative;
    flex-shrink: 0;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
  }

  .np-cover .vinyl {
    width: 100%; height: 100%;
    background: conic-gradient(from 0deg, #1a0533, #2d0b5e, #0d1a44, #1a0533);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    animation: spin 8s linear infinite;
    animation-play-state: var(--spin-state, running);
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .np-cover .vinyl::after {
    content: '';
    width: 16px; height: 16px;
    background: var(--bg-card);
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.1);
  }

  .np-info { flex: 1; min-width: 0; }
  .np-song { font-size: 13px; font-weight: 700; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-artist { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .np-album { font-size: 10px; color: var(--text-dim); margin-top: 1px; }

  /* Progress */
  .np-progress-wrap { margin-bottom: 10px; }
  .progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
    cursor: pointer;
    margin-bottom: 4px;
  }
  .progress-fill {
    height: 100%;
    width: 38%;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
    border-radius: 2px;
    position: relative;
    transition: width 1s linear;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    right: -4px; top: 50%;
    transform: translateY(-50%);
    width: 8px; height: 8px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 6px var(--accent-blue);
  }
  .progress-times { display: flex; justify-content: space-between; font-size: 9px; color: var(--text-dim); font-family: 'Rajdhani', sans-serif; }

  /* Controls */
  .np-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .ctrl-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary);
    transition: all 0.2s;
  }
  .ctrl-btn:hover { color: var(--text-primary); }
  .ctrl-btn svg { width: 18px; height: 18px; }
  .ctrl-btn.play-btn {
    width: 40px; height: 40px;
    background: var(--accent-blue);
    color: white;
    box-shadow: 0 0 14px rgba(0,170,255,0.5);
  }
  .ctrl-btn.play-btn:hover { background: var(--accent-cyan); box-shadow: 0 0 20px rgba(0,229,255,0.6); }
  .ctrl-btn.play-btn svg { width: 20px; height: 20px; }

  /* Volume */
  .volume-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 12px 0;
    margin: 4px 0 2px;
    flex-shrink: 0;
  }
  .vol-icon { color: var(--text-secondary); }
  .vol-icon svg { width: 14px; height: 14px; }
  .vol-slider {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
    outline: none;
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent-blue);
    box-shadow: 0 0 6px rgba(0,170,255,0.5);
    cursor: pointer;
  }

  /* Playlist */
  .playlist-section {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .playlist-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text-dim);
    padding: 8px 6px 6px;
    text-transform: uppercase;
  }

  .playlist-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
  }
  .playlist-item:hover { background: rgba(0,170,255,0.06); border-color: var(--border); }
  .playlist-item.playing { background: rgba(0,170,255,0.1); border-color: rgba(0,170,255,0.25); }

  .pl-num {
    width: 16px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    flex-shrink: 0;
  }
  .pl-playing-icon { color: var(--accent-blue); animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .pl-thumb {
    width: 36px; height: 36px;
    border-radius: 6px;
    background: linear-gradient(135deg, #1a0533, #0d1a44);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  .pl-info { flex: 1; min-width: 0; }
  .pl-title { font-size: 12px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pl-artist { font-size: 10px; color: var(--text-secondary); }
  .pl-dur { font-family: 'Rajdhani', sans-serif; font-size: 11px; color: var(--text-dim); flex-shrink: 0; }

  /* ── RIGHT PANEL (Navigation) 70% ── */
  .panel-navi {
    width: 70%;
    background: var(--bg-panel);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Navigation Header */
  .navi-header {
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: rgba(8,12,20,0.6);
  }

  .navi-title-row { display: flex; align-items: center; gap: 10px; }

  /* Navi App Selector */
  .navi-apps {
    display: flex;
    gap: 6px;
  }

  .navi-app-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-secondary);
  }
  .navi-app-btn:hover { border-color: var(--border-bright); color: var(--text-primary); }
  .navi-app-btn.active {
    border-color: var(--accent-amber);
    background: rgba(255,170,0,0.1);
    color: var(--accent-amber);
    box-shadow: 0 0 14px rgba(255,170,0,0.2);
  }
  .navi-app-btn svg { width: 18px; height: 18px; }
  .navi-app-btn span { font-size: 11px; font-weight: 700; letter-spacing: 0.5px; }

  .navi-right-controls { display: flex; align-items: center; gap: 10px; }

  .navi-icon-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary);
    transition: all 0.2s;
  }
  .navi-icon-btn:hover { border-color: var(--border-bright); color: var(--text-primary); }
  .navi-icon-btn svg { width: 16px; height: 16px; }

  /* Map Viewport */
  .map-viewport {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #0a1525;
  }

  /* Simulated Map */
  .map-canvas {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(rgba(0,170,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,170,255,0.03) 1px, transparent 1px),
      #0a1525;
    background-size: 40px 40px;
  }

  /* Road network simulation */
  .map-roads {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  .road-h {
    position: absolute;
    left: 0; right: 0;
    height: 3px;
    background: rgba(255,255,255,0.06);
  }
  .road-h.major {
    height: 6px;
    background: rgba(255,255,255,0.1);
  }
  .road-h.highlight {
    height: 8px;
    background: linear-gradient(90deg, transparent 0%, rgba(0,170,255,0.6) 30%, rgba(0,170,255,0.8) 50%, rgba(0,229,255,0.6) 70%, transparent 100%);
    box-shadow: 0 0 10px rgba(0,170,255,0.4);
    animation: routePulse 2s ease-in-out infinite;
  }
  @keyframes routePulse { 0%,100%{opacity:0.7} 50%{opacity:1} }

  .road-v {
    position: absolute;
    top: 0; bottom: 0;
    width: 3px;
    background: rgba(255,255,255,0.06);
  }
  .road-v.major { width: 6px; background: rgba(255,255,255,0.1); }

  .road-diag {
    position: absolute;
    height: 5px;
    background: rgba(255,255,255,0.07);
    transform-origin: left center;
  }

  /* Map blocks (buildings) */
  .map-block {
    position: absolute;
    background: rgba(30,45,80,0.6);
    border: 1px solid rgba(50,70,110,0.4);
    border-radius: 2px;
  }

  /* Route car marker */
  .car-marker {
    position: absolute;
    top: 50%;
    left: 45%;
    transform: translate(-50%, -50%);
    z-index: 10;
    animation: carFloat 3s ease-in-out infinite;
  }
  @keyframes carFloat { 0%,100%{transform:translate(-50%,-50%) translateY(0)} 50%{transform:translate(-50%,-50%) translateY(-3px)} }

  .car-dot {
    width: 18px; height: 18px;
    background: var(--accent-blue);
    border-radius: 50%;
    border: 3px solid white;
    box-shadow: 0 0 0 4px rgba(0,170,255,0.3), 0 0 20px rgba(0,170,255,0.6);
  }

  .car-pulse {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 40px; height: 40px;
    border: 2px solid rgba(0,170,255,0.4);
    border-radius: 50%;
    animation: carPulse 1.5s ease-out infinite;
  }
  @keyframes carPulse { to { transform: translate(-50%,-50%) scale(2); opacity: 0; } }

  /* Destination marker */
  .dest-marker {
    position: absolute;
    top: 22%;
    left: 68%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .dest-pin {
    width: 14px; height: 14px;
    background: var(--accent-red);
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    border: 2px solid white;
    box-shadow: 0 0 10px rgba(255,61,90,0.7);
  }
  .dest-label {
    margin-top: 4px;
    background: rgba(255,61,90,0.15);
    border: 1px solid rgba(255,61,90,0.4);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 9px;
    font-weight: 700;
    color: #ff3d5a;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  /* Map gradient overlay at top/bottom */
  .map-overlay-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(to bottom, rgba(8,12,20,0.7), transparent);
    pointer-events: none;
    z-index: 5;
  }
  .map-overlay-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 100px;
    background: linear-gradient(to top, rgba(8,12,20,0.8), transparent);
    pointer-events: none;
    z-index: 5;
  }

  /* Navigation Info Overlay */
  .navi-info-overlay {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .navi-next-turn {
    background: rgba(10,16,30,0.92);
    border: 1px solid var(--border-bright);
    border-radius: 12px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    backdrop-filter: blur(10px);
    box-shadow: var(--glow-blue);
  }

  .turn-arrow {
    width: 36px; height: 36px;
    background: var(--accent-blue);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .turn-arrow svg { width: 22px; height: 22px; color: white; }
  .turn-info-text { }
  .turn-dist { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; color: var(--accent-cyan); }
  .turn-road { font-size: 12px; color: var(--text-secondary); }

  .navi-speed-box {
    background: rgba(10,16,30,0.92);
    border: 2px solid var(--accent-amber);
    border-radius: 10px;
    padding: 6px 12px;
    text-align: center;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 14px rgba(255,170,0,0.2);
  }
  .speed-val { font-family: 'Rajdhani', sans-serif; font-size: 26px; font-weight: 700; color: var(--accent-amber); line-height: 1; }
  .speed-unit { font-size: 10px; color: var(--text-secondary); letter-spacing: 1px; }
  .speed-limit { font-size: 10px; color: var(--text-dim); margin-top: 1px; }

  /* Bottom Info Bar */
  .navi-bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 20;
    padding: 0 16px 12px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .navi-eta-card {
    background: rgba(10,16,30,0.95);
    border: 1px solid var(--border-bright);
    border-radius: 14px;
    padding: 12px 18px;
    backdrop-filter: blur(20px);
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--glow-blue);
  }

  .eta-item { text-align: center; }
  .eta-val { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; color: var(--text-primary); line-height: 1; }
  .eta-unit { font-size: 10px; color: var(--text-secondary); margin-top: 2px; letter-spacing: 1px; }

  .eta-divider { width: 1px; height: 36px; background: var(--border); }

  .eta-dest { text-align: center; }
  .eta-dest-name { font-size: 13px; font-weight: 700; color: var(--accent-cyan); }
  .eta-dest-addr { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }

  .navi-zoom-btns { display: flex; flex-direction: column; gap: 4px; }
  .zoom-btn {
    width: 36px; height: 36px;
    background: rgba(10,16,30,0.9);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-secondary);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .zoom-btn:hover { border-color: var(--border-bright); color: var(--text-primary); }

  /* Top right map controls */
  .map-top-right {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .map-mode-btn {
    background: rgba(10,16,30,0.9);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    color: var(--text-secondary);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .map-mode-btn.active { border-color: var(--accent-amber); color: var(--accent-amber); background: rgba(255,170,0,0.1); }

<script>
// ── CLOCK ──
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}
updateClock(); setInterval(updateClock, 1000);

// ── PLAYLIST DATA ──
const tracks = [
  { title: 'Blinding Lights', artist: 'The Weeknd', dur: '3:42', emoji: '🌙' },
  { title: 'Dynamite', artist: 'BTS', dur: '3:19', emoji: '💫' },
  { title: 'Levitating', artist: 'Dua Lipa', dur: '3:23', emoji: '✨' },
  { title: 'Stay', artist: 'The Kid LAROI', dur: '2:21', emoji: '🔥' },
  { title: 'good 4 u', artist: 'Olivia Rodrigo', dur: '2:58', emoji: '💥' },
  { title: 'Peaches', artist: 'Justin Bieber', dur: '3:18', emoji: '🍑' },
  { title: 'Butter', artist: 'BTS', dur: '2:44', emoji: '🧈' },
  { title: 'Industry Baby', artist: 'Lil Nas X', dur: '3:32', emoji: '🎺' },
];

let currentTrack = 0;
let isPlaying = true;

function buildPlaylist() {
  const container = document.getElementById('playlist');
  container.innerHTML = '';
  tracks.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'playlist-item' + (i === currentTrack ? ' playing' : '');
    div.innerHTML = `
      <div class="pl-num">${i === currentTrack
        ? '<svg class="pl-playing-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>'
        : (i + 1)}</div>
      <div class="pl-thumb">${t.emoji}</div>
      <div class="pl-info">
        <div class="pl-title">${t.title}</div>
        <div class="pl-artist">${t.artist}</div>
      </div>
      <div class="pl-dur">${t.dur}</div>`;
    div.onclick = () => { currentTrack = i; loadTrack(); };
    container.appendChild(div);
  });
}

function loadTrack() {
  const t = tracks[currentTrack];
  document.getElementById('npSong').textContent = t.title;
  document.getElementById('npArtist').textContent = t.artist;
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('currentTime').textContent = '0:00';
  buildPlaylist();
}

function togglePlay() {
  isPlaying = !isPlaying;
  const icon = document.getElementById('playIcon');
  const vinyl = document.getElementById('vinylDisc');
  icon.innerHTML = isPlaying
    ? '<path d="M6 19h4V5H6v14zm8-14v14l11-7z"/>'
    : '<polygon points="5 3 19 12 5 21 5 3"/>';
  vinyl.style.animationPlayState = isPlaying ? 'running' : 'paused';
}

function prevTrack() { currentTrack = (currentTrack - 1 + tracks.length) % tracks.length; loadTrack(); }
function nextTrack() { currentTrack = (currentTrack + 1) % tracks.length; loadTrack(); }

function toggleShuffle(btn) {
  btn.style.color = btn.style.color === 'var(--accent-blue)' ? '' : 'var(--accent-blue)';
}
function toggleRepeat(btn) {
  btn.style.color = btn.style.color === 'var(--accent-cyan)' ? '' : 'var(--accent-cyan)';
}

// Progress simulation
let pct = 38;
setInterval(() => {
  if (!isPlaying) return;
  pct = (pct + 0.05) % 100;
  document.getElementById('progressFill').style.width = pct + '%';
  const total = 222; // 3:42 in seconds
  const cur = Math.floor(total * pct / 100);
  const m = Math.floor(cur / 60);
  const s = (cur % 60).toString().padStart(2,'0');
  document.getElementById('currentTime').textContent = m + ':' + s;
}, 500);

// ── MUSIC APP SELECTOR ──
function selectMusicApp(app, btn) {
  document.querySelectorAll('.music-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── MAP ROADS GENERATION ──
function generateMapRoads() {
  const roads = document.getElementById('mapRoads');
  roads.innerHTML = '';
  const positions = [8, 18, 27, 37, 45, 52, 62, 73, 83, 92];
  positions.forEach((p, i) => {
    const h = document.createElement('div');
    h.className = 'road-h' + (i % 3 === 0 ? ' major' : '');
    if (i === 5) h.classList.add('highlight');
    h.style.top = p + '%';
    roads.appendChild(h);
  });
  const vPositions = [7, 14, 22, 30, 38, 47, 55, 63, 72, 81, 90];
  vPositions.forEach((p, i) => {
    const v = document.createElement('div');
    v.className = 'road-v' + (i % 3 === 0 ? ' major' : '');
    v.style.left = p + '%';
    roads.appendChild(v);
  });
  // Building blocks
  const blocks = [
    {t:10,l:15,w:6,h:5},{t:10,l:24,w:4,h:7},{t:20,l:32,w:8,h:6},
    {t:15,l:48,w:6,h:8},{t:28,l:57,w:5,h:5},{t:38,l:16,w:7,h:6},
    {t:50,l:40,w:9,h:7},{t:60,l:65,w:6,h:8},{t:42,l:73,w:8,h:6},
    {t:70,l:24,w:5,h:5},{t:75,l:50,w:7,h:5},{t:18,l:82,w:6,h:7},
  ];
  blocks.forEach(b => {
    const block = document.createElement('div');
    block.className = 'map-block';
    block.style.cssText = `top:${b.t}%;left:${b.l}%;width:${b.w}%;height:${b.h}%`;
    roads.appendChild(block);
  });
}

// ── NAVI APP SELECTOR ──
const naviDestinations = {
  kakao: { name: '코엑스몰', time: '23', dist: '12.4', eta: '18:42', turn: '우회전 → 테헤란로', turnDist: '500m 후' },
  tmap:  { name: '강남역 1번출구', time: '18', dist: '9.2', eta: '18:36', turn: '직진 → 강남대로', turnDist: '300m 후' },
  naver: { name: '롯데월드타워', time: '31', dist: '17.8', eta: '18:49', turn: '좌회전 → 올림픽대로', turnDist: '800m 후' },
  google: { name: 'COEX Convention', time: '25', dist: '13.1', eta: '18:44', turn: 'Turn right → Teheran-ro', turnDist: 'In 600m' },
};

function selectNavi(app, btn) {
  document.querySelectorAll('.navi-app-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const d = naviDestinations[app];
  document.getElementById('destName').textContent = d.name;
  document.getElementById('etaTime').textContent = d.eta;
  document.querySelector('.dest-label').textContent = d.name;
  document.querySelectorAll('.eta-val')[1].textContent = d.time;
  document.querySelectorAll('.eta-val')[2].textContent = d.dist;
  document.querySelector('.turn-dist').textContent = d.turnDist;
  document.querySelector('.turn-road').textContent = d.turn;
}

function setMapMode(mode, btn) {
  document.querySelectorAll('.map-mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── SPEED SIMULATION ──
let baseSpeed = 62;
setInterval(() => {
  const delta = (Math.random() - 0.5) * 4;
  baseSpeed = Math.max(40, Math.min(90, baseSpeed + delta));
  document.getElementById('speedVal').textContent = Math.round(baseSpeed);
  const el = document.getElementById('speedVal');
  if (baseSpeed > 75) { el.style.color = 'var(--accent-red)'; }
  else if (baseSpeed > 65) { el.style.color = 'var(--accent-amber)'; }
  else { el.style.color = 'var(--accent-amber)'; }
}, 2000);
